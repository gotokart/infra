server {
    listen 80;
    server_name gotokart.xyz www.gotokart.xyz admin.gotokart.xyz docs.gotokart.xyz;

    # Let's Encrypt HTTP-01 challenge — must be reachable over plain HTTP.
    # certbot --webroot writes ./.well-known/acme-challenge/<token> here;
    # nginx serves it without redirecting. Everything else is upgraded to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    # admin.gotokart.xyz is served by the same SPA; the frontend detects the
    # "admin." host and shows the admin-only login + dashboard. The storefront
    # hosts never expose the admin panel.
    server_name gotokart.xyz www.gotokart.xyz admin.gotokart.xyz;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json;
}

# ── Documentation site (Nextra static export) ───────────────────────────────
# Served from the prebuilt ./docs-site directory (Next.js `out/`). Build it on
# the host with BASE_PATH unset so assets resolve at the domain root.
server {
    listen 443 ssl;
    server_name docs.gotokart.xyz;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/docs;
    index index.html;

    # Nextra exports with trailingSlash → /backend/ maps to /backend/index.html.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
