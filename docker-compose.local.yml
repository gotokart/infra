# Local development — includes MySQL container (no external DB needed)
# Usage: docker compose -f docker-compose.local.yml up --build

services:

  mysql:
    image: mysql:8.0
    container_name: gotokart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gotokartDB
      MYSQL_USER: gotokart
      MYSQL_PASSWORD: Gotokart#2026Ec2
    ports:
      - "3306:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql
    networks:
      - gotokart-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gotokart-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gotokartDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: gotokart
      SPRING_DATASOURCE_PASSWORD: "Gotokart#2026Ec2"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_SHOW_SQL: "true"
      SPRING_JACKSON_SERIALIZATION_FAIL_ON_EMPTY_BEANS: "false"
      SPRING_JACKSON_DEFAULT_PROPERTY_INCLUSION: non_null
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-gotokart-product-images-035379289330-us-east-1-an}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_S3_PRESIGN_TTL_SECONDS: ${AWS_S3_PRESIGN_TTL_SECONDS:-300}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gotokart-net

  nginx:
    image: nginx:alpine
    container_name: gotokart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - gotokart-net

networks:
  gotokart-net:
    driver: bridge

volumes:
  mysql-local-data:
    driver: local
