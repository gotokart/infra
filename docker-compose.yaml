services:

  # Build from the Spring Boot repo — infra/ has no pom.xml; context "." produced an
  # outdated jar missing newer routes (e.g. POST .../image-upload-url → HTTP 404).
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gotokart-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database — points at AWS RDS. Values come from infra/.env on the EC2 host.
      # Example endpoint: gotokart-db.cluster-xxxxx.us-east-1.rds.amazonaws.com
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_HOST}:${RDS_PORT:-3306}/${RDS_DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC&authenticationPlugin=caching_sha2_password
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JACKSON_SERIALIZATION_FAIL_ON_EMPTY_BEANS: "false"
      SPRING_JACKSON_DEFAULT_PROPERTY_INCLUSION: non_null
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-86400000}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-gotokart-product-images-035379289330-us-east-1-an}
      # Leave AWS_S3_PUBLIC_BASE_URL empty to use the virtual-hosted S3 URL.
      # Set to your CloudFront domain (e.g. https://cdn.gotokart.com) once configured.
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_S3_PRESIGN_TTL_SECONDS: ${AWS_S3_PRESIGN_TTL_SECONDS:-300}
      JAVA_OPTS: "-Xms128m -Xmx350m -XX:+UseSerialGC -Dspring.jmx.enabled=false"
    mem_limit: 420m
    networks:
      - gotokart-net

  nginx:
    image: nginx:alpine
    container_name: gotokart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # certs/ is git-ignored — generate on the host before first start.
      # See infra/certs/README.md for the openssl command.
      - ./certs:/etc/nginx/certs:ro
      # Webroot served at /.well-known/acme-challenge/ for Let's Encrypt
      # HTTP-01 renewals (certbot --webroot drops tokens here).
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - gotokart-net

networks:
  gotokart-net:
    driver: bridge
