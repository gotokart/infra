services:

  mysql:
    image: mysql:8.4
    container_name: gotokart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root@1234
      MYSQL_DATABASE: gotokart
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    mem_limit: 350m
    networks:
      - gotokart-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pRoot@1234"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gotokart-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gotokart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&authenticationPlugin=caching_sha2_password
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Root@1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JACKSON_SERIALIZATION_FAIL_ON_EMPTY_BEANS: "false"
      SPRING_JACKSON_DEFAULT_PROPERTY_INCLUSION: non_null
      JWT_SECRET: GoToKartSuperSecretJwtKey2026!!VeryLongAndSecure@#$%
      JWT_EXPIRY_MS: "86400000"
      JAVA_OPTS: "-Xms128m -Xmx350m -XX:+UseSerialGC -Dspring.jmx.enabled=false"
    mem_limit: 420m
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gotokart-net

  nginx:
    image: nginx:alpine
    container_name: gotokart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - gotokart-net

networks:
  gotokart-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
