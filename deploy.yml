name: Deploy to AWS EC2 via SSM

on:
  push:
    branches: [ main ]

permissions:
  id-token: write   # required for OIDC auth with AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM Send-Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/gotokart/backend && git pull origin main",
              "cd /home/ubuntu/gotokart/frontend && git pull origin main",
              "cd /home/ubuntu/gotokart/infra && git pull origin main",
              "cp /home/ubuntu/gotokart/backend/pom.xml /home/ubuntu/gotokart/infra/",
              "cp -r /home/ubuntu/gotokart/backend/src /home/ubuntu/gotokart/infra/src",
              "cp -r /home/ubuntu/gotokart/frontend /home/ubuntu/gotokart/infra/frontend",
              "cd /home/ubuntu/gotokart/infra && docker compose up -d --build",
              "docker compose -f /home/ubuntu/gotokart/infra/docker-compose.yaml ps",
              "echo GoToKart deployed successfully"
            ]' \
            --comment "GoToKart deploy from GitHub Actions" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for the command to finish (up to 10 min)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # Print output
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text